name: Deploy

# Deploy each service to Google Cloud on merge to main — but only the
# service(s) whose source actually changed. Auth uses Workload Identity
# Federation (no long-lived service-account keys).
#
# Redeploys are code-only: no --set-env-vars / --set-secrets / --trigger are
# passed, so each service keeps its existing env vars, secrets, and triggers.

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:        # allow manual runs (deploys everything)

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  PROJECT: digitaltwin-499202
  REGION: us-central1

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      garmin_sync: ${{ steps.f.outputs.garmin_sync }}
      garmin_intraday_sync: ${{ steps.f.outputs.garmin_intraday_sync }}
      garmin_activity_sync: ${{ steps.f.outputs.garmin_activity_sync }}
      meal_upload: ${{ steps.f.outputs.meal_upload }}
      meal_web: ${{ steps.f.outputs.meal_web }}
      health_dashboard: ${{ steps.f.outputs.health_dashboard }}
      omron_sync: ${{ steps.f.outputs.omron_sync }}
      libre_sync: ${{ steps.f.outputs.libre_sync }}
      upload_photo: ${{ steps.f.outputs.upload_photo }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: f
        with:
          # On manual runs there is no diff base, so force everything true.
          filters: |
            garmin_sync: 'functions/garmin_sync/**'
            garmin_intraday_sync: 'functions/garmin_intraday_sync/**'
            garmin_activity_sync: 'functions/garmin_activity_sync/**'
            meal_upload: 'functions/meal_upload/**'
            meal_web: 'functions/meal_web/**'
            health_dashboard: 'functions/health_dashboard/**'
            omron_sync: 'functions/omron_sync/**'
            libre_sync: 'functions/libre_sync/**'
            upload_photo: 'functions/upload_photo/**'

  # Gate: nothing deploys unless the test suites pass.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r functions/health_dashboard/requirements.txt pytest
      - run: python -m pytest functions/ -v

  deploy:
    needs: [changes, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/663692868459/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@digitaltwin-499202.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      # --- gen2 Cloud Functions (code-only redeploys) -----------------------
      - name: garmin-sync
        if: ${{ needs.changes.outputs.garmin_sync == 'true' || github.event_name == 'workflow_dispatch' }}
        run: |
          gcloud functions deploy garmin-sync --gen2 --region="$REGION" --project="$PROJECT" \
            --source=functions/garmin_sync --runtime=python312 --entry-point=garmin_sync

      - name: garmin-intraday-sync
        if: ${{ needs.changes.outputs.garmin_intraday_sync == 'true' || github.event_name == 'workflow_dispatch' }}
        run: |
          gcloud functions deploy garmin-intraday-sync --gen2 --region="$REGION" --project="$PROJECT" \
            --source=functions/garmin_intraday_sync --runtime=python312 --entry-point=garmin_intraday_sync

      - name: garmin-activity-sync
        if: ${{ needs.changes.outputs.garmin_activity_sync == 'true' || github.event_name == 'workflow_dispatch' }}
        run: |
          # --service-account and --set-env-vars are explicit here (unlike the
          # other functions) because this is a first-ever deploy: with no prior
          # manual deploy to inherit a runtime SA / PROJECT env var from, omitting
          # them defaults to the Compute SA (can't read secrets or write BigQuery)
          # and crashes on startup with KeyError: 'PROJECT'. Later redeploys go
          # back to omitting these flags, same as every other function.
          gcloud functions deploy garmin-activity-sync --gen2 --region="$REGION" --project="$PROJECT" \
            --source=functions/garmin_activity_sync --runtime=python312 --entry-point=garmin_activity_sync \
            --service-account=twin-pipeline@digitaltwin-499202.iam.gserviceaccount.com \
            --set-env-vars=PROJECT=digitaltwin-499202,BQ_DATASET=health_twin \
            --trigger-http

      - name: meal-upload
        if: ${{ needs.changes.outputs.meal_upload == 'true' || github.event_name == 'workflow_dispatch' }}
        run: |
          gcloud functions deploy meal-upload --gen2 --region="$REGION" --project="$PROJECT" \
            --source=functions/meal_upload --runtime=python312 --entry-point=meal_upload

      - name: omron-sync
        if: ${{ needs.changes.outputs.omron_sync == 'true' || github.event_name == 'workflow_dispatch' }}
        run: |
          gcloud functions deploy omron-sync --gen2 --region="$REGION" --project="$PROJECT" \
            --source=functions/omron_sync --runtime=python312 --entry-point=omron_sync

      - name: libre-sync
        if: ${{ needs.changes.outputs.libre_sync == 'true' || github.event_name == 'workflow_dispatch' }}
        run: |
          gcloud functions deploy libre-sync --gen2 --region="$REGION" --project="$PROJECT" \
            --source=functions/libre_sync --runtime=python312 --entry-point=libre_sync

      - name: upload_photo
        if: ${{ needs.changes.outputs.upload_photo == 'true' || github.event_name == 'workflow_dispatch' }}
        run: |
          gcloud functions deploy upload_photo --gen2 --region="$REGION" --project="$PROJECT" \
            --source=functions/upload_photo --runtime=python311 --entry-point=upload_photo

      # --- Cloud Run service from source (buildpacks / Procfile) ------------
      - name: meal-web
        if: ${{ needs.changes.outputs.meal_web == 'true' || github.event_name == 'workflow_dispatch' }}
        run: |
          gcloud run deploy meal-web --source=functions/meal_web \
            --region="$REGION" --project="$PROJECT" --quiet

      # Private post-prandial experiment dashboard (meal photos + clinical
      # stats). --no-allow-unauthenticated actively revokes the allUsers
      # binding left over from its earlier life as a public showcase page.
      - name: health-dashboard
        if: ${{ needs.changes.outputs.health_dashboard == 'true' || github.event_name == 'workflow_dispatch' }}
        run: |
          gcloud run deploy health-dashboard --source=functions/health_dashboard \
            --region="$REGION" --project="$PROJECT" --quiet \
            --no-allow-unauthenticated --memory=1Gi --max-instances=2 --session-affinity
